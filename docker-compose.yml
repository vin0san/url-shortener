services:
  app_service:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database_service:5432/${POSTGRES_DB}
    depends_on:
      - database_service

  database_service:
    image: postgres:16.14
    env_file: .env
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db_data: